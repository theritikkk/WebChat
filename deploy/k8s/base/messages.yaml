apiVersion: apps/v1
kind: Deployment
metadata:
  name: messages
  namespace: webchat
  labels:
    app: messages
spec:
  replicas: 1
  selector:
    matchLabels:
      app: messages
  template:
    metadata:
      labels:
        app: messages
    spec:
      initContainers:
        - name: wait-mongo
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mongo 27017; do echo waiting for mongo; sleep 2; done
      containers:
        - name: messages
          image: webchat-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3003
              name: http
          env:
            - name: WEBCHAT_SERVICE
              value: "messages"
            - name: PORT_MESSAGES
              value: "3003"
          envFrom:
            - secretRef:
                name: webchat-app
            - configMapRef:
                name: webchat-config
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: "50m"
              memory: 128Mi
            limits:
              cpu: "500m"
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: messages
  namespace: webchat
spec:
  selector:
    app: messages
  ports:
    - port: 3003
      targetPort: http
