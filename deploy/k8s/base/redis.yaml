apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: webchat
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: "50m"
              memory: 64Mi
            limits:
              cpu: "250m"
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: webchat
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: redis
