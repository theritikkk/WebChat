apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: webchat
  namespace: webchat
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: webchat.local
      http:
        paths:
          - path: /health
            pathType: Exact
            backend:
              service:
                name: gateway
                port:
                  number: 4000
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 4000
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: chat
                port:
                  number: 5000
