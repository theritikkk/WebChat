apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: webchat
  labels:
    app: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      initContainers:
        - name: wait-auth
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z auth 3001; do echo waiting for auth; sleep 2; done
        - name: wait-messages
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z messages 3003; do echo waiting for messages; sleep 2; done
      containers:
        - name: gateway
          image: webchat-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
              name: http
          env:
            - name: WEBCHAT_SERVICE
              value: "gateway"
            - name: PORT_GATEWAY
              value: "4000"
          envFrom:
            - configMapRef:
                name: webchat-config
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: "50m"
              memory: 128Mi
            limits:
              cpu: "500m"
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: webchat
spec:
  selector:
    app: gateway
  ports:
    - port: 4000
      targetPort: http
