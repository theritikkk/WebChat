apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: webchat
  labels:
    app: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done
      containers:
        - name: auth
          image: webchat-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
              name: http
          env:
            - name: WEBCHAT_SERVICE
              value: "auth"
            - name: PORT_AUTH
              value: "3001"
          envFrom:
            - secretRef:
                name: webchat-app
            - configMapRef:
                name: webchat-config
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: "50m"
              memory: 128Mi
            limits:
              cpu: "500m"
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: webchat
spec:
  selector:
    app: auth
  ports:
    - port: 3001
      targetPort: http
