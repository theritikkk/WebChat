apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat
  namespace: webchat
  labels:
    app: chat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat
  template:
    metadata:
      labels:
        app: chat
    spec:
      initContainers:
        - name: wait-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis 6379; do echo waiting for redis; sleep 2; done
      containers:
        - name: chat
          image: webchat-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: WEBCHAT_SERVICE
              value: "chat"
            - name: PORT_CHAT
              value: "5000"
          envFrom:
            - secretRef:
                name: webchat-app
            - configMapRef:
                name: webchat-config
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: "50m"
              memory: 128Mi
            limits:
              cpu: "500m"
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: chat
  namespace: webchat
spec:
  selector:
    app: chat
  ports:
    - port: 5000
      targetPort: http
